name: Leaves Test CI

on:
  push:
    branches-ignore: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository
        uses: actions/checkout@v4
      - name: Get JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "zulu"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never
          cache-read-only: false
      - name: Setup Git Config
        run: |
          git config --global user.email "ci-test@leavesmc.org"
          git config --global user.name "LeavesMC Test CI"
          git config --global core.excludesfile "$HOME/.gitignore_global"
          printf '.DS_Store\n._*\n' > "$HOME/.gitignore_global"
      # Leaves 26.1 升级期间：leavesweight 升级版尚未发布到 repo.leavesmc.org，
      # 从 HyacinthHaru/leavesweight 拉取并 publish 到 mavenLocal 供本项目使用。
      - name: Check out leavesweight fork
        uses: actions/checkout@v4
        with:
          repository: HyacinthHaru/leavesweight
          ref: upgrade-26.1
          path: leavesweight-src
      - name: Publish leavesweight to mavenLocal
        working-directory: leavesweight-src
        run: ./gradlew publishToMavenLocal
      - name: Apply Patches
        run: ./gradlew applyAllPatches
      - name: Create Leavesclip Jar
        run: ./gradlew createMojmapLeavesclipJar
      - name: Move Jar
        run: |
          prop() {
            awk -F= -v key="$1" '$1 == key { val = $2; sub(/[[:space:]]*#.*$/, "", val); gsub(/^[[:space:]]+|[[:space:]]+$/, "", val); print val }' gradle.properties
          }
          
          jarName="leaves-$(prop mcVersion).jar"
          mv leaves-server/build/libs/leaves-leavesclip-"$(prop version)"-mojmap.jar "$jarName"
          echo "jar=$jarName" >> "$GITHUB_ENV"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.jar }}
          path: ${{ env.jar }}
